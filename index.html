<!DOCTYPE html>
<head>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1">
<div id="app"></div>
<div data-id="loader" class="loader" style="display:none;"></div>
</html>

<script>
    class Loader {
        constructor(element) {
            this.element = element
            this.loaders = new Map()
        }

        show(name) {
            if (this.loaders.has(name)) {
                throw new Error('loader ' + name + ' already exists')
            }
            this.element.style.display = "block"
            this.loaders.set(name, true)
        }

        hide(name) {
            this.loaders.delete(name)
            if (this.loaders.size === 0) {
                this.element.style.display = "none"
            }
        }
    }

    const app = document.getElementById('app')
    let previousPage = null
    const routerPages = {
        'add-book': {name: 'pages/add-book', component: 'AddBook', admin: true, label: 'Добавить книгу'},
        'book-list': {name: 'pages/book-list', component: 'BookList', admin: false, label: "Список книг"},
        'deleted-list': {name: 'pages/deleted-list', component: 'DeletedBookList', admin: true, label: "Удаленные"},
        'orders': {name: 'pages/orders', component: 'Orders', admin: true, label: "Заказы"},
        'edit-book': {name: 'pages/edit-book', component: 'EditBook', admin: true, label: "Редактировать"},
        'libraries': {name: 'pages/library-list', component: 'AddLibrary', admin: true, label: "Библиотеки"},
        'about-page': {name: 'pages/about-page', component: 'AboutPage', admin: false, label: "О нас"},
    }

    const loader = new Loader(document.querySelector(`[data-id="loader"]`))
    function navigate(page, params = {}) {
        const query = new URLSearchParams({ page, ...params }).toString();
        google.script.history.push(
            { page, ...params },
            '',
            '?' + query
        );

        router(page, params);
    }

    function executeScripts(container) {
        const scripts = container.querySelectorAll("script");

        scripts.forEach(oldScript => {
            const newScript = document.createElement("script");

            if (oldScript.src) {
                newScript.src = oldScript.src;
            } else {
                newScript.textContent = oldScript.textContent;
            }

            document.body.appendChild(newScript);
            oldScript.remove();
        });
    }

    function renderHtml(html) {
        app.innerHTML = html;
        executeScripts(app);
    }

    function router(page, params = {}) {
        const pageEL = routerPages[page]
        if (!pageEL) {
            console.error('unknown page ' + page)
            return
        }
        if (previousPage) {
            window.App[previousPage.component].destroy()
        }
        previousPage = pageEL

        loader.show(page)
        google.script.run
            .withSuccessHandler(function(html) {
                renderHtml(html);
                window.App[pageEL.component].init(loader)
                console.log('router', params, window.onPageLoad)
                if (window.onPageLoad) {
                    window.onPageLoad(params);
                }
                loader.hide(page)
            })
            .loadPage(pageEL.name);
    }


    // Back / Forward
    google.script.history.setChangeHandler(function(e) {
        const state = e.state || {};
        router(state.page || 'edit-book', state);
    });

    // Direct link
    google.script.url.getLocation(function(location) {
        const params = location.parameter || {};
        router(params.page || 'edit-book', params);
    });

    function loadNavigation(ns) {
        let navigation = document.querySelector(`[data-id="navigation"]`)
        ns.Navigation.init(navigation, true)
    }

</script>

<style>
    body {
        background: #f5f5f5;
        padding: 20px;
    }

    .card {
        border-radius: 12px;
    }

    .material-label {
        font-weight: 500;
        font-size: 14px;
        margin-bottom: 6px;
    }

    table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
    }

    .table-bordered {
        border: 1px solid #dee2e6;
    }

    .loader {
        border: 6px solid #f3f3f3;
        border-top: 6px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        position: fixed;
        top: 50%;
        left: 50%;
        margin-top: -20px;
        margin-left: -20px;
        z-index: 9999;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .table-bordered td,
    .table-bordered th {
        border: 1px solid #dee2e6;
    }

    .hidden {
        display: none
    }
</style>
